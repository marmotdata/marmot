name: Release Plugin

on:
  push:
    branches: [main]
    paths:
      - "plugins/*/plugin.yaml"
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin name to force-release (e.g. postgresql). Reads version from plugins/<name>/plugin.yaml."
        required: true
        type: string

permissions:
  contents: write # to push receipt git tag
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io/${{ github.repository_owner }}/plugins

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      count: ${{ steps.set.outputs.count }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Install yq
        run: |
          set -euo pipefail
          if command -v yq >/dev/null; then exit 0; fi
          sudo wget -q -O /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Compute matrix
        id: set
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_PLUGIN: ${{ github.event.inputs.plugin }}
        run: |
          set -euo pipefail

          releases=()

          add_release() {
            local yaml="$1"
            local plugin_dir plugin_name version
            plugin_dir=$(dirname "$yaml")
            plugin_name=$(basename "$plugin_dir")
            version=$(yq -r '.version' "$yaml")

            if [ -z "$version" ] || [ "$version" = "null" ]; then
              echo "::error file=${yaml}::missing .version"
              exit 1
            fi
            if ! echo "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
              echo "::error file=${yaml}::invalid semver '${version}'"
              exit 1
            fi

            releases+=("{\"plugin\":\"${plugin_name}\",\"version\":\"${version}\",\"workdir\":\"${plugin_dir}\"}")
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            yaml="plugins/${DISPATCH_PLUGIN}/plugin.yaml"
            if [ ! -f "$yaml" ]; then
              echo "::error::no plugin.yaml at ${yaml}"
              exit 1
            fi
            add_release "$yaml"
          else
            # Compare each changed plugin.yaml against its previous version.
            changed=$(git diff --name-only HEAD^..HEAD | grep -E '^plugins/[^/]+/plugin\.yaml$' || true)
            for yaml in $changed; do
              new_ver=$(yq -r '.version' "$yaml")
              old_ver=$(git show "HEAD^:${yaml}" 2>/dev/null | yq -r '.version // ""' 2>/dev/null || echo "")
              if [ "$new_ver" = "$old_ver" ]; then
                continue
              fi
              add_release "$yaml"
            done
          fi

          if [ ${#releases[@]} -eq 0 ]; then
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
            echo "count=0" >> "$GITHUB_OUTPUT"
          else
            joined=$(IFS=,; echo "${releases[*]}")
            echo "matrix={\"include\":[${joined}]}" >> "$GITHUB_OUTPUT"
            echo "count=${#releases[@]}" >> "$GITHUB_OUTPUT"
          fi
          echo "Detected releases: ${releases[*]:-<none>}"

  release:
    needs: detect
    if: needs.detect.outputs.count != '0'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.workdir }}/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.workdir }}/go.sum

      - uses: sigstore/cosign-installer@v3
      - uses: oras-project/setup-oras@v1

      - name: Run tests
        working-directory: ${{ matrix.workdir }}
        run: go test ./...

      - name: Detect cgo plugin
        id: cgo
        run: |
          if grep -q "CGO_ENABLED=1" "${{ matrix.workdir }}/.goreleaser.yaml"; then
            echo "cgo=true" >> "$GITHUB_OUTPUT"
          else
            echo "cgo=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run GoReleaser
        if: steps.cgo.outputs.cgo != 'true'
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean --skip=validate
          workdir: ${{ matrix.workdir }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ matrix.version }}

      # cgo plugins need cross toolchains for the darwin builds, so run
      # goreleaser inside the goreleaser-cross image, the same setup the
      # main marmot release uses. The OIDC env vars are passed through for
      # cosign keyless signing.
      - name: Run GoReleaser (cgo)
        if: steps.cgo.outputs.cgo == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: v${{ matrix.version }}
        run: |
          docker run --rm \
            -e CGO_ENABLED=1 \
            -e GITHUB_TOKEN \
            -e GORELEASER_CURRENT_TAG \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            -e COSIGN_YES=true \
            -v "$PWD:/workspace" \
            -w "/workspace/${{ matrix.workdir }}" \
            --entrypoint /bin/sh \
            ghcr.io/goreleaser/goreleaser-cross:v1.26.0 -c \
            'git config --global --add safe.directory /workspace && goreleaser release --clean --skip=validate'

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | oras login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Guard against overwriting an existing tag
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          if oras manifest fetch --descriptor "${REGISTRY}/${PLUGIN}:${VERSION}" >/dev/null 2>&1; then
            echo "::error::${REGISTRY}/${PLUGIN}:${VERSION} already exists. Bump the version in plugin.yaml to release again."
            exit 1
          fi

      - name: Push plugin artifacts to GHCR
        id: push
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ matrix.version }}
          WORKDIR: ${{ matrix.workdir }}
        run: |
          set -euo pipefail
          REPO="${REGISTRY}/${PLUGIN}"

          platform_tags=()
          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"
            arch="${platform#*/}"

            binary=$(find "${WORKDIR}/dist" -type f -name "marmot-plugin-${PLUGIN}" -path "*_${os}_${arch}*" | head -n1)
            if [ -z "$binary" ]; then
              echo "No binary found for ${platform}" >&2
              exit 1
            fi

            tmp=$(mktemp -d)
            gzip -9 -c "$binary" > "${tmp}/marmot-plugin-${PLUGIN}.gz"

            tag="${VERSION}-${os}-${arch}"
            (
              cd "$tmp"
              oras push \
                --artifact-type application/vnd.marmot.plugin.v1 \
                --artifact-platform "${platform}" \
                --annotation "org.opencontainers.image.source=https://github.com/${{ github.repository }}" \
                --annotation "org.opencontainers.image.version=${VERSION}" \
                "${REPO}:${tag}" \
                "marmot-plugin-${PLUGIN}.gz:application/vnd.marmot.plugin.v1+gzip"
            )
            platform_tags+=("$tag")
          done

          oras manifest index create "${REPO}:${VERSION},latest" "${platform_tags[@]}"

          digest=$(oras manifest fetch --descriptor "${REPO}:${VERSION}" | jq -r .digest)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"

      - name: Sign plugin artifacts
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ matrix.version }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          REPO="${REGISTRY}/${PLUGIN}"

          cosign sign --yes "${REPO}@${DIGEST}"

          for platform in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${platform%/*}"
            arch="${platform#*/}"
            digest=$(oras manifest fetch --descriptor "${REPO}:${VERSION}-${os}-${arch}" | jq -r .digest)
            cosign sign --yes "${REPO}@${digest}"
          done

      - name: Write receipt git tag
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ matrix.version }}
        run: |
          set -euo pipefail
          tag="plugins/${PLUGIN}/v${VERSION}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — leaving as-is"
            exit 0
          fi
          git tag "$tag"
          git push origin "$tag"

      - name: Release summary
        env:
          PLUGIN: ${{ matrix.plugin }}
          VERSION: ${{ matrix.version }}
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          {
            echo "## Plugin published"
            echo
            echo '```'
            echo "${REGISTRY}/${PLUGIN}:${VERSION}"
            echo "${REGISTRY}/${PLUGIN}@${DIGEST}"
            echo '```'
            echo
            echo "Update \`internal/plugin/install/core_plugins.json\` in marmotdata/marmot to pin this release:"
            echo
            echo '```json'
            echo "\"${PLUGIN}\": { \"version\": \"${VERSION}\", \"digest\": \"${DIGEST}\" }"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
