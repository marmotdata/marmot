version: 2
project_name: marmot-plugin-duckdb

# DuckDB requires cgo, so unlike the pure-Go plugins each platform is a
# separate build with its own cross toolchain. Releases must run inside the
# goreleaser-cross image (see the release-plugin workflow), the same setup
# the main marmot binary uses.
env:
  - CGO_ENABLED=1

builds:
  - id: duckdb-linux-amd64
    main: .
    binary: marmot-plugin-duckdb
    goos: [linux]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    flags:
      - -trimpath
      - -tags=netgo,osusergo
    ldflags:
      - -s -w
      - -extldflags "-static"

  - id: duckdb-linux-arm64
    main: .
    binary: marmot-plugin-duckdb
    goos: [linux]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    flags:
      - -trimpath
      - -tags=netgo,osusergo
    ldflags:
      - -s -w
      - -extldflags "-static"

  - id: duckdb-darwin-amd64
    main: .
    binary: marmot-plugin-duckdb
    goos: [darwin]
    goarch: [amd64]
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
      - MACOSX_DEPLOYMENT_TARGET=11.0
    flags:
      - -trimpath
    ldflags:
      - -s -w

  - id: duckdb-darwin-arm64
    main: .
    binary: marmot-plugin-duckdb
    goos: [darwin]
    goarch: [arm64]
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
      - MACOSX_DEPLOYMENT_TARGET=11.0
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: marmot-plugin-duckdb
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - --yes
      - --output-signature=${signature}
      - --output-certificate=${certificate}
      - ${artifact}
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
