info:
  contact: {}
  description: API for interacting with Marmot
  license:
    name: MIT
    url: https://opensource.org/license/MIT
  title: Marmot API
  version: "0.1"
paths:
  /admin/search/reindex:
    get:
      description: Check whether a search reindex is currently running and whether
        Elasticsearch is configured.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ReindexStatusResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get reindex status
      tags:
      - admin
    post:
      description: Trigger a full reindex from PostgreSQL to Elasticsearch. The reindex
        runs asynchronously in the background. Only one reindex can run at a time.
      produces:
      - application/json
      responses:
        "202":
          description: Accepted
          schema:
            $ref: '#/definitions/ReindexAcceptedResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/ErrorResponse'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/ErrorResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Start search reindex
      tags:
      - admin
  /agents/{asset_id}/activity:
    get:
      parameters:
      - description: Agent asset id
        in: path
        name: asset_id
        required: true
        type: string
      - description: Lookback window (e.g. 24h, 7d). Default 24h.
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ActivityResponse'
      summary: Agent activity
      tags:
      - agents
  /agents/{asset_id}/runs:
    get:
      parameters:
      - description: Agent asset id
        in: path
        name: asset_id
        required: true
        type: string
      - description: Lookback window (e.g. 24h, 7d). Default 24h.
        in: query
        name: period
        type: string
      - description: Max number of runs to return
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/RunsResponse'
      summary: List agent runs
      tags:
      - agents
  /agents/{asset_id}/stats:
    get:
      parameters:
      - description: Agent asset id
        in: path
        name: asset_id
        required: true
        type: string
      - description: Lookback window (e.g. 24h, 7d). Default 24h.
        in: query
        name: period
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Stats'
      summary: Agent stats
      tags:
      - agents
  /agents/runs:
    post:
      consumes:
      - application/json
      parameters:
      - description: Agent run record
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/RecordRunRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/AgentRun'
      summary: Record agent run
      tags:
      - agents
  /api/v1/assets/preview/{id}:
    get:
      description: Fetches sample data from the asset's data source. Requires assets:preview
        permission.
      parameters:
      - description: Asset ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/PreviewResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/ErrorResponse'
        "403":
          description: Missing assets:preview permission
          schema:
            $ref: '#/definitions/ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
        "501":
          description: Data preview not supported for this asset
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: Get preview data for an asset
      tags:
      - assets
  /api/v1/ingestion/runs:
    get:
      parameters:
      - description: Filter by schedule ID
        in: query
        name: schedule_id
        type: string
      - description: Filter by status
        in: query
        name: status
        type: string
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/ListJobRunsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/ErrorResponse'
      summary: List ingestion job runs
      tags:
      - ingestion
  /api/v1/ingestion/runs/{id}:
    get:
      parameters:
      - description: Job run ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/JobRun'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/ErrorResponse'
